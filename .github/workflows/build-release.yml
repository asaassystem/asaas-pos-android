name: Build & Release APK

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle and generate wrapper
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Generate Gradle Wrapper
        run: gradle wrapper --gradle-version 8.5

      - name: Generate Debug Keystore for signing
        run: |
          keytool -genkey -v \
            -keystore app/debug.keystore \
            -alias androiddebugkey \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000 \
            -storepass android \
            -keypass android \
            -dname "CN=ASAAS POS, OU=Android, O=AsaasSystem, L=SA, S=SA, C=SA"

      - name: Build Signed Release APK
        run: ./gradlew assembleRelease

      - name: Get Version Name
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)"/\1/')
          VERSION=${VERSION:-1.0.0}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Rename APK
        run: |
          APK_PATH=$(find app/build/outputs/apk/release/ -name "*.apk" | head -1)
          cp "$APK_PATH" "app/build/outputs/apk/release/asaas-pos-v${{ steps.version.outputs.version }}.apk"

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asaas-pos-release
          path: app/build/outputs/apk/release/asaas-pos-v*.apk

      - name: Delete old latest release
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push origin :refs/tags/latest 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Latest GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: ASAAS POS v${{ steps.version.outputs.version }}
          body: |
            ## تطبيق نقاط البيع ASAAS POS
            - تسجيل دخول المستأجرين
            - حفظ بيانات الدخول تلقائياً
            - متوافق مع Android 7.0+
          files: app/build/outputs/apk/release/asaas-pos-v*.apk
          draft: false
          prerelease: false
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
