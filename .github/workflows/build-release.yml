name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'

      - name: Create root build.gradle
        run: |
          if [ ! -f build.gradle ]; then
            echo "buildscript {" > build.gradle
            echo "    repositories { google(); mavenCentral() }" >> build.gradle
            echo "    dependencies {" >> build.gradle
            echo "        classpath 'com.android.tools.build:gradle:8.2.0'" >> build.gradle
            echo "        classpath 'org.jetbrains.kotlin:kotlin-gradle-plugin:1.9.22'" >> build.gradle
            echo "    }" >> build.gradle
            echo "}" >> build.gradle
            echo "allprojects { repositories { google(); mavenCentral() } }" >> build.gradle
          fi

      - name: Build Release APK
        run: gradle assembleRelease

      - name: Get Version Name
        id: version
        run: |
          VERSION=$(grep "versionName" app/build.gradle | head -1 | sed 's/.*versionName "\(.*\)"/\1/')
          VERSION=${VERSION:-1.0.0}
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: asaas-pos-release
          path: app/build/outputs/apk/release/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          name: ASAAS POS v${{ steps.version.outputs.version }}
          files: app/build/outputs/apk/release/*.apk
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
